<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Track E — Oasis to Ocean</title>
<style>
body { margin: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { border: 1px solid #333; }
</style>
</head>
<body>
<canvas id="c" width="1200" height="900"></canvas>
<script>
const ctx = document.getElementById('c').getContext('2d');
const W = 1200, H = 900;

const zones = [
  { name: 'Oasis', color: '#4CAF50', straightRatio: '40:60', type: '오아시스 출발' },
  { name: 'Desert Plain', color: '#FDD835', straightRatio: '65:35', type: '사막 평원 직선' },
  { name: 'Dune Crossing', color: '#FF9800', straightRatio: '45:55', type: '사구 횡단' },
  { name: 'Coastal Approach', color: '#4FC3F7', straightRatio: '50:50', type: '해안 접근로' },
  { name: 'Beach Road', color: '#1E88E5', straightRatio: '55:45', type: '해안도로 질주' },
];

const trackName = 'Oasis to Ocean';
const fullThrottle = 48;

const waypoints = [
  // Zone 0: Oasis — winding start through greenery
  [
    {x:80,y:500},{x:110,y:460},{x:150,y:430},{x:200,y:420},{x:240,y:440},{x:260,y:480},
  ],
  // Zone 1: Desert Plain — long sweeping straights
  [
    {x:290,y:500},{x:330,y:490},{x:390,y:470},{x:460,y:460},{x:530,y:455},{x:590,y:460},{x:640,y:475},
  ],
  // Zone 2: Dune Crossing — rolling dune curves
  [
    {x:670,y:500},{x:680,y:540},{x:660,y:580},{x:630,y:610},{x:650,y:650},{x:690,y:670},
    {x:730,y:650},{x:750,y:610},{x:740,y:570},{x:760,y:530},
  ],
  // Zone 3: Coastal Approach — transition curves
  [
    {x:790,y:510},{x:820,y:480},{x:850,y:440},{x:870,y:390},{x:860,y:340},{x:830,y:310},
    {x:790,y:300},{x:760,y:320},
  ],
  // Zone 4: Beach Road — fast coastal finish
  [
    {x:740,y:280},{x:770,y:250},{x:810,y:230},{x:860,y:220},{x:910,y:225},{x:940,y:250},
    {x:930,y:290},
  ],
];

const allPts = waypoints.flat();
const totalWP = allPts.length;

// Background
ctx.fillStyle = '#1a1a2e';
ctx.fillRect(0, 0, W, H);

// Decorative oasis pond
ctx.beginPath();
ctx.ellipse(180, 470, 60, 40, 0, 0, Math.PI*2);
ctx.fillStyle = 'rgba(76,175,80,0.12)';
ctx.fill();
ctx.strokeStyle = 'rgba(76,175,80,0.25)';
ctx.lineWidth = 1;
ctx.stroke();

// Decorative ocean area
ctx.beginPath();
ctx.ellipse(860, 180, 100, 50, 0, 0, Math.PI*2);
ctx.fillStyle = 'rgba(30,136,229,0.1)';
ctx.fill();
ctx.strokeStyle = 'rgba(30,136,229,0.2)';
ctx.lineWidth = 1;
ctx.stroke();

// Draw track
function drawSegment(pts, color) {
  if (pts.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) {
    const prev = pts[i-1], cur = pts[i];
    ctx.quadraticCurveTo(prev.x, prev.y, (prev.x+cur.x)/2, (prev.y+cur.y)/2);
  }
  const last = pts[pts.length-1];
  ctx.lineTo(last.x, last.y);
  ctx.strokeStyle = color;
  ctx.lineWidth = 14;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();
}

for (let z = 0; z < waypoints.length; z++) {
  let pts = [...waypoints[z]];
  if (z > 0) pts = [waypoints[z-1][waypoints[z-1].length-1], ...pts];
  drawSegment(pts, zones[z].color);
}

// Center line dashed
ctx.setLineDash([8, 12]);
ctx.lineWidth = 1.5;
ctx.strokeStyle = 'rgba(255,255,255,0.3)';
ctx.beginPath();
ctx.moveTo(allPts[0].x, allPts[0].y);
for (let i = 1; i < allPts.length; i++) {
  const prev = allPts[i-1], cur = allPts[i];
  ctx.quadraticCurveTo(prev.x, prev.y, (prev.x+cur.x)/2, (prev.y+cur.y)/2);
}
ctx.stroke();
ctx.setLineDash([]);

// Checkpoints
const cpIndices = [];
let cumIdx = 0;
for (let z = 0; z < waypoints.length - 1; z++) {
  cumIdx += waypoints[z].length;
  cpIndices.push(cumIdx - 1);
}
cpIndices.forEach((idx, i) => {
  const p = allPts[idx];
  ctx.beginPath();
  ctx.arc(p.x, p.y, 8, 0, Math.PI*2);
  ctx.fillStyle = '#FFD700';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#000';
  ctx.font = 'bold 10px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('CP'+(i+1), p.x, p.y);
});

// Corner apex dots
function getAngle(a, b, c) {
  const v1 = {x: a.x-b.x, y: a.y-b.y};
  const v2 = {x: c.x-b.x, y: c.y-b.y};
  const dot = v1.x*v2.x + v1.y*v2.y;
  const m1 = Math.sqrt(v1.x*v1.x+v1.y*v1.y);
  const m2 = Math.sqrt(v2.x*v2.x+v2.y*v2.y);
  if (m1===0||m2===0) return Math.PI;
  return Math.acos(Math.min(1, Math.max(-1, dot/(m1*m2))));
}

for (let i = 1; i < allPts.length-1; i++) {
  const angle = getAngle(allPts[i-1], allPts[i], allPts[i+1]);
  if (angle < 2.4) {
    ctx.beginPath();
    ctx.arc(allPts[i].x, allPts[i].y, 4, 0, Math.PI*2);
    ctx.fillStyle = '#ff4081';
    ctx.fill();
  }
}

// Direction arrows
for (let i = 4; i < allPts.length-1; i += 6) {
  const p = allPts[i], n = allPts[i+1];
  const ang = Math.atan2(n.y-p.y, n.x-p.x);
  const mx = (p.x+n.x)/2, my = (p.y+n.y)/2;
  ctx.save();
  ctx.translate(mx, my);
  ctx.rotate(ang);
  ctx.beginPath();
  ctx.moveTo(8, 0);
  ctx.lineTo(-5, -5);
  ctx.lineTo(-5, 5);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fill();
  ctx.restore();
}

// START marker
ctx.beginPath();
ctx.arc(allPts[0].x, allPts[0].y, 12, 0, Math.PI*2);
ctx.fillStyle = '#4CAF50';
ctx.fill();
ctx.strokeStyle = '#fff';
ctx.lineWidth = 2;
ctx.stroke();
ctx.fillStyle = '#fff';
ctx.font = 'bold 10px sans-serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('S', allPts[0].x, allPts[0].y);

// FINISH marker
const fin = allPts[allPts.length-1];
ctx.beginPath();
ctx.rect(fin.x-12, fin.y-12, 24, 24);
ctx.fillStyle = '#f44336';
ctx.fill();
for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) {
  if ((r+c)%2===0) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(fin.x-12+c*6, fin.y-12+r*6, 6, 6);
  }
}
ctx.strokeStyle = '#fff';
ctx.lineWidth = 2;
ctx.strokeRect(fin.x-12, fin.y-12, 24, 24);

// Legend
const lx = 960, ly = 30, lw = 220, lh = 380;
ctx.fillStyle = 'rgba(0,0,0,0.7)';
ctx.strokeStyle = '#555';
ctx.lineWidth = 1;
ctx.beginPath();
ctx.roundRect(lx, ly, lw, lh, 8);
ctx.fill();
ctx.stroke();

ctx.fillStyle = '#fff';
ctx.font = 'bold 18px sans-serif';
ctx.textAlign = 'left';
ctx.fillText(trackName, lx+12, ly+28);

ctx.font = '12px sans-serif';
ctx.fillStyle = '#aaa';
ctx.fillText(`Full Throttle: ~${fullThrottle}%`, lx+12, ly+50);
ctx.fillText(`Total Waypoints: ${totalWP}`, lx+12, ly+68);

let yOff = ly + 95;
zones.forEach((z, i) => {
  ctx.fillStyle = z.color;
  ctx.fillRect(lx+12, yOff-8, 14, 14);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px sans-serif';
  ctx.fillText(z.name, lx+32, yOff+3);
  ctx.font = '11px sans-serif';
  ctx.fillStyle = '#bbb';
  ctx.fillText(`직선:곡선 ${z.straightRatio} | ${z.type}`, lx+32, yOff+18);
  ctx.fillText(`WP: ${waypoints[i].length}`, lx+32, yOff+32);
  yOff += 52;
});

yOff += 10;
ctx.fillStyle = '#4CAF50';
ctx.beginPath(); ctx.arc(lx+20, yOff, 5, 0, Math.PI*2); ctx.fill();
ctx.fillStyle = '#ccc'; ctx.font = '11px sans-serif';
ctx.fillText('START', lx+32, yOff+4);
yOff += 18;
ctx.fillStyle = '#f44336';
ctx.fillRect(lx+15, yOff-5, 10, 10);
ctx.fillStyle = '#ccc';
ctx.fillText('FINISH', lx+32, yOff+4);
yOff += 18;
ctx.fillStyle = '#FFD700';
ctx.beginPath(); ctx.arc(lx+20, yOff, 5, 0, Math.PI*2); ctx.fill();
ctx.fillStyle = '#ccc';
ctx.fillText('Checkpoint', lx+32, yOff+4);
yOff += 18;
ctx.fillStyle = '#ff4081';
ctx.beginPath(); ctx.arc(lx+20, yOff, 4, 0, Math.PI*2); ctx.fill();
ctx.fillStyle = '#ccc';
ctx.fillText('Corner Apex', lx+32, yOff+4);
</script>
</body>
</html>
